<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- ManticView mark: an astrolabe for the future — graduated ring, rete stars,
       and the probability line as the alidade, sighting upward at a live data point -->
  <!-- mater (outer ring) -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#17171E" stroke-width="6"/>
  <!-- degree graduations -->
  <path d="M106,60 L101,60 M99.8,83 L95.5,80.5 M83,99.8 L80.5,95.5 M60,106 L60,101 M37,99.8 L39.5,95.5 M20.2,83 L24.5,80.5 M14,60 L19,60 M20.2,37 L24.5,39.5 M37,20.2 L39.5,24.5 M60,14 L60,19 M83,20.2 L80.5,24.5 M99.8,37 L95.5,39.5"
        stroke="#9DA4BC" stroke-width="2.6" stroke-linecap="round"/>
  <!-- tropic ring -->
  <circle cx="60" cy="60" r="30" fill="none" stroke="#9DA4BC" stroke-width="2.2"/>
  <!-- rete star pointers -->
  <circle cx="44" cy="42" r="2.4" fill="#9DA4BC"/>
  <circle cx="78" cy="72" r="2.4" fill="#9DA4BC"/>
  <!-- alidade: the probability line, sighting upward -->
  <path d="M26.3,81.6 L93.7,38.4" fill="none" stroke="#4F46E5" stroke-width="6.5" stroke-linecap="round"/>
  <!-- live data point at the sighting end -->
  <circle cx="93.7" cy="38.4" r="6.2" fill="#4F46E5" stroke="#F9F8F6" stroke-width="3"/>
  <!-- pivot pin -->
  <circle cx="60" cy="60" r="3.6" fill="#17171E"/>
</svg>
